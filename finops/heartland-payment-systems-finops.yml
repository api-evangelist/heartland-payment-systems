specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Heartland Payment Systems
providerId: heartland-payment-systems
publisherName: Global Payments Inc. (Heartland brand)
serviceCategory: Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - Payment Processing
  - Card Present
  - Ecommerce
  - Payroll
  - FinOps
  - FOCUS
notes: Heartland Payment Systems sells merchant processing on a quote basis - no public price book is
  available. The FinOps shape is take-rate (per-transaction percentage + flat) plus optional subscription
  add-ons (gift/loyalty, payroll), but the actual rates are bilateral. Meters below are the right shape;
  the price column is intentionally left as 'see merchant agreement'.
description: 'FOCUS-aligned FinOps stub for Heartland Payment Systems. Take-rate + per-transaction billing
  through Global Payments; rates negotiated per merchant agreement.'
sources:
  - https://www.heartland.us/payments
  - https://developer.globalpayments.com/
billingModel:
  pricingCategory: Take Rate + Flat (per merchant agreement)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Heartland Payment Systems
  ServiceCategory: Payments
  ProviderName: Heartland Payment Systems
  PublisherName: Global Payments Inc.
  InvoiceIssuerName: Global Payments Inc.
  PricingCategory: Take Rate
  PricingUnit: transaction
  BillingCurrency: USD
  ChargeCategory: Usage
principles:
  - name: Visibility
    description: Use Heartland's merchant portal and the Portico Gateway reporting endpoints to track
      authorizations, captures, refunds, and chargebacks; reconcile against the monthly merchant statement.
  - name: Allocation
    description: Tag transactions with merchant location, channel (card-present vs e-commerce), and
      product line via ClientTransactionId / TagData fields so revenue and fee can be attributed downstream.
  - name: Optimization
    description: Cost levers are merchant-agreement-level - renegotiate at volume tiers, route appropriate
      traffic to lower-cost interchange categories (e.g. Level II/III data on commercial cards), and
      minimize chargebacks through 3DS / fraud screening to avoid fee surcharges.
  - name: Accountability
    description: Assign a treasury / finance owner who reconciles statements monthly, owns chargeback
      response, and renegotiates rates at thresholds defined in the merchant agreement.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
meters:
  - name: card_transactions
    description: Authorized card transactions processed through Heartland
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_id
      - mid
      - card_brand
      - channel
      - country
  - name: transaction_volume
    description: Gross dollar volume of processed transactions
    unit: USD
    aggregation: sum
    dimensions:
      - merchant_id
      - card_brand
      - channel
  - name: chargebacks
    description: Chargeback events; surcharge applies per the merchant agreement
    unit: event
    aggregation: sum
    dimensions:
      - merchant_id
      - reason_code
  - name: refunds
    description: Refund events
    unit: event
    aggregation: sum
    dimensions:
      - merchant_id
  - name: gift_loyalty_activity
    description: Gift / loyalty card activity (issuance, reload, redemption)
    unit: event
    aggregation: sum
    dimensions:
      - merchant_id
      - program
  - name: payroll_runs
    description: Heartland payroll run events
    unit: run
    aggregation: sum
    dimensions:
      - merchant_id
