specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Heartland Payment Systems
providerId: heartland-payment-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Bill Pay
  - Card Present
  - Card Not Present
  - Ecommerce
  - Payment Processing
  - Payments
  - Payroll
  - Point of Sale
notes: Heartland Payment Systems (a Global Payments brand) does not publish a public per-tier pricing or
  per-transaction rate page. Merchant processing rates (interchange-plus, flat-rate, custom) are quoted via
  the Heartland sales team based on the merchant's industry, volume, and channel mix. The Global Payments
  / Heartland Developer Portal exposes API documentation but no public pricing for the Portico Gateway,
  Card Present, Bill Pay, Gift / Loyalty, or Payroll APIs. This artifact is left as an unreconciled stub
  pending merchant-quote data.
sources:
  - https://www.heartland.us/payments
  - https://developer.globalpayments.com/
description: Heartland Payment Systems sells merchant processing on a quote basis. There is no public
  per-tier API pricing; processing rates are negotiated per merchant by the Heartland sales team.
plans:
  - id: heartland-payment-systems-merchant
    name: Merchant Processing (Quote-Based)
    type: enterprise
    description: Per-merchant processing rates and API access negotiated by the Heartland / Global Payments
      sales team. Includes payment processing across card-present, card-not-present, e-commerce, bill pay,
      gift / loyalty, and payroll surfaces. Rates not publicly disclosed.
    entries:
      - label: Card Processing Rate
        description: Per-transaction processing rate (interchange-plus or flat) negotiated per merchant
        name: card_processing_rate
        type: metered
        metric: transaction
        limit: -1
        timeFrame: month
        geo: US
        domains: []
        unit: 1
        price: 'contact sales'
        userMultiplied: false
      - label: API Access
        description: Access to the Portico Gateway and partner APIs is included with merchant onboarding
        name: api_access
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: US
        domains: []
        unit: 1
        price: 'included with merchant agreement'
        userMultiplied: false
    elements:
      - name: Quote-Based Pricing
      - name: Merchant Onboarding Required
      - name: Heartland Bill Pay API
      - name: Heartland Card Present API
      - name: Heartland Gift and Loyalty API
      - name: Heartland Payroll API
      - name: Heartland Portico Gateway API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
