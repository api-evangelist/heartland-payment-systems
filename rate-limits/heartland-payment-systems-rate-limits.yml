specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Heartland Payment Systems
providerId: heartland-payment-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Bill Pay
  - Card Present
  - Card Not Present
  - Ecommerce
  - Payment Processing
  - Payments
  - Payroll
  - Point of Sale
  - Rate Limiting
notes: Heartland / Global Payments does not publish numeric rate limits for the Portico Gateway, Card
  Present, Bill Pay, Gift / Loyalty, or Payroll APIs on its public developer portal. Production traffic
  capacity is provisioned per merchant and is not publicly documented. Consumers must consult the executed
  merchant agreement and the developer portal API reference for any documented throttling behavior.
sources:
  - https://developer.globalpayments.com/
  - https://www.heartland.us/payments
description: No public numeric rate limits are documented. Capacity is provisioned per merchant under the
  executed processing agreement.
limits:
  - tier: merchant
    name: Per-Merchant Capacity
    scope: merchant
    metric: varies
    limit: 'see merchant agreement / developer portal API reference'
    applies:
      - Heartland Bill Pay API
      - Heartland Card Present API
      - Heartland Gift and Loyalty API
      - Heartland Payroll API
      - Heartland Portico Gateway API
    notes: Heartland does not publish numeric per-API throttle ceilings. Card-network and processor-side
      controls (issuer, scheme, fraud) apply in addition to any platform throttle.
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter on 5xx and any 429-class responses; honor
      Retry-After when present.
  - name: Idempotency
    description: Use the Portico Gateway's documented idempotency mechanisms (e.g. ClientTransactionId)
      to avoid duplicate authorizations on retry.
  - name: PCI Scope
    description: Limit retries on PCI-scoped endpoints to avoid expanding cardholder-data exposure.
  - name: Capacity Uplift
    description: Higher sustained throughput is provisioned by the Heartland implementation team during
      merchant onboarding.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
